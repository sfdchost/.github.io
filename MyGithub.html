
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            text-align: center;
            background-color: #f4f4f4;
        }
        header {
            background: #24292e;
            color: white;
            padding: 20px;
        }
        section {
            padding: 40px;
        }
        footer {
            background: #ddd;
            padding: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>🚀 Welcome to My GitHub Page</h1>
</header>

<section>
    <h2>Hello 👋</h2>
    <p>This is my simple static website hosted on GitHub Pages.</p>
    <button onclick="showMessage()">Click Me</button>
    <p id="msg"></p>
</section>

<footer>
    <p>© 2026 My Page</p>
</footer>

<script>
function showMessage() {
    document.getElementById("msg").innerText = "Thanks for visiting!";
}
</script>

</body>
</html>
